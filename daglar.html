<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Türkiye Dağları - İnteraktif Coğrafya Oyunu</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      :root {
        --primary: #2c3e50;
        --accent: #3498db;
        --success: #27ae60;
        --error: #c0392b;
        --bg-overlay: rgba(255, 255, 255, 0.95);
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden; /* Harita tüm ekranı kaplayacak */
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Harita Katmanı */
      #map {
        flex-grow: 1;
        width: 100%;
        height: 100%;
        z-index: 1;
        background: #aad3df; /* Deniz rengi fallback */
      }

      /* Üst Bilgi Paneli */
      .header-panel {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-overlay);
        padding: 10px 25px;
        border-radius: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        z-index: 1000;
        text-align: center;
        width: 90%;
        max-width: 600px;
        backdrop-filter: blur(5px);
      }

      .header-panel h1 {
        margin: 0;
        font-size: 1.2rem;
        color: var(--primary);
      }

      .header-panel p {
        margin: 5px 0 0 0;
        font-size: 0.85rem;
        color: #666;
      }

      /* Lejant (Kategori Renkleri) */
      .legend {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 5px;
        font-size: 0.75rem;
        flex-wrap: wrap;
      }
      .legend-item {
        display: flex;
        align-items: center;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 4px;
        display: inline-block;
      }

      /* Alt Kontrol Paneli */
      .control-panel {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        display: flex;
        gap: 15px;
        background: var(--bg-overlay);
        padding: 10px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 0.9rem;
        transition: transform 0.1s;
      }
      .btn:active {
        transform: scale(0.95);
      }
      .btn-check {
        background-color: var(--success);
        color: white;
      }
      .btn-reset {
        background-color: var(--primary);
        color: white;
      }

      /* Modal (Soru Penceresi) */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 2000;
        display: none;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: white;
        padding: 25px;
        border-radius: 15px;
        width: 90%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .options-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-top: 15px;
      }

      .option-btn {
        padding: 12px;
        background: #f4f4f4;
        border: 1px solid #ddd;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .option-btn:hover {
        background: #e9e9e9;
      }
      .option-btn.selected {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }

      /* Leaflet Marker Stilleri */
      .custom-marker {
        border-radius: 50%;
        border: 2px solid white;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        transition: all 0.3s ease;
      }
      .marker-default {
        background-color: #95a5a6;
      }
      .marker-selected {
        background-color: var(--accent);
        transform: scale(1.2);
      }
      .marker-correct {
        background-color: var(--success);
      }
      .marker-wrong {
        background-color: var(--error);
      }

      /* Volkanik/Kırık/Kıvrım ayrımı için ufak renk farkları yerine
           kullanıcı seçim yaptıktan sonra renk değişimi yapacağız.
           Ancak Lejantta türleri belirttik, belki hover'da ipucu verilebilir.
        */
    </style>
  </head>
  <body>
    <div class="header-panel">
      <h1>Türkiye'nin Dağları</h1>
      <p>Haritadaki noktalara tıklayıp doğru dağı eşleştirin.</p>
      <div class="legend">
        <div class="legend-item">
          <span class="dot" style="background: #d35400"></span>Volkanik
        </div>
        <div class="legend-item">
          <span class="dot" style="background: #2980b9"></span>Kıvrım
        </div>
        <div class="legend-item">
          <span class="dot" style="background: #f1c40f"></span>Kırık
        </div>
        <span style="color: #999">(Kategoriler bilgi amaçlıdır)</span>
      </div>
    </div>

    <div id="map"></div>

    <div class="control-panel">
      <button class="btn btn-check" onclick="checkGame()">
        SONUÇLARI KONTROL ET
      </button>
      <button class="btn btn-reset" onclick="resetGame()">SIFIRLA</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-content">
        <h3 id="modalTitle" style="margin: 0; color: var(--primary)">
          Bu dağın ismi nedir?
        </h3>
        <div class="options-list" id="optionsList"></div>
        <button
          onclick="closeModal()"
          style="
            margin-top: 15px;
            background: none;
            border: none;
            color: #777;
            cursor: pointer;
          "
        >
          Kapat
        </button>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      // --- VERİ SETİ (Gerçek Koordinatlar) ---
      // Koordinatlar yaklaşık zirve noktalarıdır.
      const mountains = [
        // Volkanik
        {

        {

        },
        {

        {

        },
        {
          id: 6,

          cat: "volkanik",

          lng: 34.1644,
        },
        {
          id: 7,
          name: "Melendiz Dağı",
          cat: "volkanik",

        },
        {

          cat: "volkanik",
          lat: 37.6667,
          lng: 39.8333,
        },
        { id: 9, name: "Karadağ", cat: "volkanik", lat: 37.4, lng: 33.15 },
        {
          id: 10,
          name: "Kula Volkanları",
          cat: "volkanik",
          lat: 38.5833,
          lng: 28.5167,
        },

        // Kırık (Horst)
        { id: 11, name: "Kaz Dağları", cat: "kirik", lat: 39.7, lng: 26.8333 },
        {
          id: 12,
          name: "Madra Dağı",
          cat: "kirik",
          lat: 39.2333,
          lng: 27.1333,
        },
        { id: 13, name: "Yunt Dağı", cat: "kirik", lat: 38.8, lng: 27.2833 },
        { id: 14, name: "Bozdağlar", cat: "kirik", lat: 38.3333, lng: 28.0 },
        { id: 15, name: "Aydın Dağları", cat: "kirik", lat: 37.95, lng: 28.0 },
        { id: 16, name: "Menteşe Dağları", cat: "kirik", lat: 37.3, lng: 28.5 },
        {

          name: "Nur (Amanos) Dağları",
          cat: "kirik",

        },

        // Kıvrım
        {
          id: 18,

        },
        {
          id: 19,

        },
        {

        },
        {
          id: 21,

          lng: 32.5,
        },
        { id: 22, name: "Canik Dağları", cat: "kivrim", lat: 40.9, lng: 36.5 },
        {
          id: 23,
          name: "Giresun Dağları",
          cat: "kivrim",
          lat: 40.5,
          lng: 38.5,
        },
        {
          id: 24,
          name: "Kaçkar Dağları",
          cat: "kivrim",
          lat: 40.8333,
          lng: 41.1667,
        },
        {
          id: 25,
          name: "Yalnızçam Dağları",
          cat: "kivrim",
          lat: 41.1667,
          lng: 42.5,
        },
        {
          id: 26,
          name: "Allahuekber Dağları",
          cat: "kivrim",
          lat: 40.5833,
          lng: 42.5,
        },
        { id: 27, name: "Bey Dağları", cat: "kivrim", lat: 36.55, lng: 30.05 },
        {
          id: 28,
          name: "Geyik Dağları",
          cat: "kivrim",
          lat: 36.9,
          lng: 32.1667,
        },
        {
          id: 29,
          name: "Sultan Dağları",
          cat: "kivrim",
          lat: 38.3333,
          lng: 31.25,
        },
        {
          id: 30,
          name: "Bolkar Dağları",
          cat: "kivrim",
          lat: 37.2833,
          lng: 34.3333,
        },
        { id: 31, name: "Aladağlar", cat: "kivrim", lat: 37.7833, lng: 35.2 },
        {
          id: 32,
          name: "Tahtalı Dağları",
          cat: "kivrim",
          lat: 38.5,
          lng: 36.5,
        },
        {
          id: 33,
          name: "Cilo (Buzul) Dağı",
          cat: "kivrim",
          lat: 37.4833,
          lng: 44.0,
        },
        { id: 34, name: "Munzur Dağları", cat: "kivrim", lat: 39.4, lng: 39.3 },
        { id: 35, name: "Uludağ", cat: "kivrim", lat: 40.0694, lng: 29.2217 },
      ];

      // Oyun Değişkenleri
      let userAnswers = {};
      let currentPinId = null;
      let map;
      let markers = {}; // id -> Leaflet Marker object

      // Haritayı Başlat
      function initMap() {
        // Türkiye merkezli başlat
        map = L.map("map", {
          center: [39.0, 35.5],
          zoom: 6,
          zoomControl: false, // Mobilde daha temiz görünüm için yeri değişebilir
        });

        // Zoom kontrolünü sağ alta al
        L.control.zoom({ position: "bottomright" }).addTo(map);

        // TOPOGRAFİK HARİTA KATMANI (OpenTopoMap)
        // Bu katman dağları çok net gösterir.
        L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
          maxZoom: 17,
          attribution:
            'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a> | Map style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a>',
        }).addTo(map);

        // Markerları Ekle
        mountains.forEach((mt) => {
          // Özel bir daire marker (CircleMarker) oluşturuyoruz
          const marker = L.circleMarker([mt.lat, mt.lng], {
            radius: 10,
            fillColor: getCategoryColor(mt.cat),
            color: "#fff",
            weight: 2,
            opacity: 1,
            fillOpacity: 0.8,
          });

          // Tıklama Olayı
          marker.on("click", () => openModal(mt.id));

          // Haritaya ekle
          marker.addTo(map);
          markers[mt.id] = marker;
        });
      }

      // Kategoriye göre başlangıç rengi (İsteğe bağlı, şu an gri tonları kullanıp seçimde renklendirebiliriz)
      function getCategoryColor(cat) {
        // Başlangıçta ipucu vermemek için hepsini gri yapıyoruz.
        // İstenirse return cat === 'volkanik' ? '#d35400' : ... yapılabilir.
        return "#7f8c8d";
      }

      // Modalı Aç
      function openModal(id) {
        currentPinId = id;
        const mt = mountains.find((m) => m.id === id);
        const options = generateOptions(mt);

        const optionsList = document.getElementById("optionsList");
        optionsList.innerHTML = "";

        document.getElementById("modalTitle").innerText =
          "Bu nokta hangi dağdır?";

        options.forEach((optName) => {
          const btn = document.createElement("button");
          btn.className = "option-btn";
          btn.innerText = optName;

          if (userAnswers[id] === optName) {
            btn.classList.add("selected");
          }

          btn.onclick = () => selectAnswer(id, optName);
          optionsList.appendChild(btn);
        });

        document.getElementById("modalOverlay").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("modalOverlay").style.display = "none";
        currentPinId = null;
      }

      // Cevap Seçimi
      function selectAnswer(id, answer) {
        userAnswers[id] = answer;

        // Marker rengini "Seçildi" (Mavi) yap
        const marker = markers[id];
        marker.setStyle({
          fillColor: "#3498db",
          radius: 12,
          fillOpacity: 1,
        });

        closeModal();
      }

      // Seçenek Oluşturma Algoritması
      function generateOptions(correctMt) {
        // Aynı kategoriden ve farklı kategoriden şıklar karma
        const sameCat = mountains.filter(
          (m) => m.cat === correctMt.cat && m.id !== correctMt.id
        );
        const otherCat = mountains.filter((m) => m.cat !== correctMt.cat);

        let opts = [correctMt.name];

        shuffle(sameCat);
        // 2 Tane aynı kategoriden (zorluk için)
        opts.push(...sameCat.slice(0, 2).map((m) => m.name));

        // Kalanı rastgele tamamla
        while (opts.length < 4) {
          const random =
            mountains[Math.floor(Math.random() * mountains.length)];
          if (!opts.includes(random.name)) opts.push(random.name);
        }

        shuffle(opts);
        return opts;
      }

      // Sonuç Kontrolü
      function checkGame() {
        let correctCount = 0;
        let wrongCount = 0;
        let emptyCount = 0;

        mountains.forEach((mt) => {
          const ans = userAnswers[mt.id];
          const marker = markers[mt.id];

          if (!ans) {
            emptyCount++;
            marker.setStyle({ fillColor: "#7f8c8d" }); // Gri
          } else if (ans === mt.name) {
            correctCount++;
            marker.setStyle({
              fillColor: "#2ecc71", // Yeşil
              radius: 12,
              color: "#fff",
            });
            marker.bindPopup(`<b>✅ Doğru!</b><br>${mt.name}`).openPopup();
          } else {
            wrongCount++;
            marker.setStyle({
              fillColor: "#e74c3c", // Kırmızı
              radius: 12,
            });
            marker
              .bindPopup(`<b>❌ Yanlış!</b><br>Doğrusu: ${mt.name}`)
              .openPopup();
          }
        });

        alert(
          `SONUÇLAR:\n\n✅ Doğru: ${correctCount}\n❌ Yanlış: ${wrongCount}\n⚪ Boş: ${emptyCount}`
        );
      }

      function resetGame() {
        if (confirm("Tüm işaretlemeler silinecek?")) {
          userAnswers = {};
          mountains.forEach((mt) => {
            const marker = markers[mt.id];
            marker.setStyle({
              fillColor: "#7f8c8d",
              radius: 10,
              fillOpacity: 0.8,
            });
            marker.closePopup();
            marker.unbindPopup();
          });
        }
      }

      // Array Karıştırıcı
      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      }

      // Başlat
      initMap();
    </script>
  </body>
</html>
